server:
  port: ${HTTP_PORT:8080}
  address: ${HTTP_HOST:127.0.0.1}

spring:
  mail:
    host: ${MAILEXAM_LOGIN}.mailexam.io
    port: ${MAILEXAM_PORT:587}
    username: ${MAILEXAM_LOGIN}
    password: ${MAILEXAM_PASSWORD}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

mail:
  from: ${MAIL_FROM:noreply@example.test}
